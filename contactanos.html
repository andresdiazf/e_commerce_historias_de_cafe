<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contactanos</title>
    <link rel="icon" type="image/x-icon" href="./img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="contactanos.css">
    <link rel="stylesheet" href="paletaColores.css">
</head>

<body>
    <main class="flex-fill container py-5">
        <div class="card container">
            <div class="text-center mb-4">
                <h2 style="font-family: 'Playfair Display', serif; color: var(--color-primary);">Escríbenos</h2>
                <p style="color: var(--color-primary); opacity: 0.8;">Tu opinión es el aroma de nuestro servicio</p>
            </div>
            <form action="https://formspree.io/f/xlgajpkq" class="row g-3" target="_top" method="POST">

                <div class="col-12">
                    <label class="form-label" for="name">Nombre</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Tu nombre completo"
                        required />
                </div>

                <div class="col-md-6">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="nombre@ejemplo.com"
                        required />
                </div>

                <div class="col-md-6">
                    <label class="form-label" for="number">Número Teléfono</label>
                    <input type="tel" class="form-control" id="number" name="number" placeholder="+57 300 1234567" />
                </div>

                <div class="col-12">
                    <label class="form-label" for="message">Mensaje</label>
                    <textarea class="form-control" id="message" name="message" rows="4" required placeholder="Escribe aca tu mensaje de contacto"></textarea>
                </div>

                <div class="col-12 text-end">
                    <button class="btnEnviar btn px-4 py-2" type="submit">Enviar</button>
                </div>
            </form>
    </main>
    </div>
    <footer class="bgP text-white py-5">
        <div class="container text-center">
            <h4 class="mb-4">Historias de Café</h4>
            <div class="row">
                <div class="col-md-6 mx-auto">
                    <p class="mb-1 small"><strong>Autores:</strong> Andres Diaz, Didier Cuan, Marcia baquero, Maira Pinilla, Zully
                    Tamayo
                    </p>
                    <p class="small">© 2026 Historias de Café. Todos los derechos reservados.</p>
                </div>
            </div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
