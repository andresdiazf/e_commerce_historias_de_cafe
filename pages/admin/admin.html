<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="/components/product/productForm.css">
</head>
<body>
    <div class="dashboard-container">
    <aside class="sidebar">
        <div class="logo-section">
            <img src="/assets/img/logo.png" alt="Admin" width="30">
            <span>Admin</span>
        </div>
        <nav>
            <ul>
                <li class="active">📊 Dashboard</li>
                <li>📦 Productos</li>
                <li>📝 Ordenes</li>
                <li>👤 Usuarios</li>
                <li>⚙️ Configuración</li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <span>Dashboard</span>
            <div class="user-info">🔔 👤 🖼️</div>
        </header>

        <section class="content-padding">
            <h2>Dashboard</h2>
            <p>Bienvenido de vuelta a historias de café</p>

            <div class="stats-grid">
                <div class="stat-card"><strong>$12,500</strong><span>Ventas Totales</span></div>
                <div class="stat-card"><strong>35</strong><span>Ordenes hoy</span></div>
                <div class="stat-card"><strong>120</strong><span>Usuarios Activos</span></div>
                <div class="stat-card"><strong>8</strong><span>Stock bajo</span></div>
            </div>

            <div class="form-section">
                <h3>Cargar Nuevo Producto</h3>
    
            </div>

            <div class="table-section">
                <div class="table-header">
                    <h3>Productos</h3>
                    <button class="btn-add">Añadir productos</button>
                </div>
                <div id="productform-container"></div>
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-tabla">
                        </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/products.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
