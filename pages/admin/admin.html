<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/assets/img/logo.png">   
    <title>Admin</title>

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="/components/product/productForm.css">
</head>

<body>

<div class="dashboard-container">

    <!--  SIDEBAR PRO -->
    <aside class="sidebar">
        <div class="logo-section">
            <img src="/assets/img/logo.png" alt="Admin" width="30">
            <span>Admin</span>
        </div>

        <nav>
            <ul>
                <li class="active" data-view="Dashboard">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </li>

                <li data-view="Productos">
                    <i class="bi bi-box-seam"></i>
                    <span>Productos</span>
                </li>

                <li data-view="Ordenes">
                    <i class="bi bi-receipt"></i>
                    <span>Ordenes</span>
                </li>

                <li data-view="Usuarios">
                    <i class="bi bi-people"></i>
                    <span>Usuarios</span>
                </li>

                <li data-view="Configuración">
                    <i class="bi bi-gear"></i>
                    <span>Configuración</span>
                </li>
            </ul>
        </nav>
    </aside>

    <!--  CONTENIDO -->
    <main class="main-content">

        <!-- TOP BAR -->
        <header class="top-bar">
            <span>Dashboard</span>

            <div class="user-info">
                <i class="bi bi-bell"></i>
                <i class="bi bi-person-circle"></i>
            </div>
        </header>

        <!-- CONTENIDO DINÁMICO -->
        <section class="content-padding">

            <h2>Dashboard</h2>
            <p>Bienvenido de vuelta a historias de café ☕</p>

            <!-- STATS -->
            <div class="stats-grid">
                <div class="stat-card"><strong>$0</strong><span>Ventas Totales</span></div>
                <div class="stat-card"><strong>0</strong><span>Ordenes hoy</span></div>
                <div class="stat-card"><strong>0</strong><span>Usuarios Activos</span></div>
                <div class="stat-card"><strong>0</strong><span>Stock bajo</span></div>
            </div>

            <!-- FORM -->
            <div class="form-section">
                <h3>Cargar Nuevo Producto</h3>
            </div>

            <!-- TABLA -->
            <div class="table-section">
                <div class="table-header">
                    <h3>Productos</h3>
                    <button class="btn-add" id="openModal">Añadir productos</button>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-tabla"></tbody>
                </table>
            </div>

        </section>

    </main>
</div>

<!-- MODAL PRO -->
<div id="modal-producto" class="modal-overlay">
    <div class="modal-content">

        <span class="close-btn">&times;</span>

        <h3>Añadir Nuevo Producto</h3>

        <div id="productform-container"></div>

    </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/products.js"></script>
<script src="/js/main.js"></script>
<script src="/js/admin.js"></script>

</body>
</html>
