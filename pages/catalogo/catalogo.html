<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historias de Café - Catálogo</title>
    <link rel="stylesheet" href="catalogo.css">
    <!-- Iconos sugeridos (FontAwesome) -->
    <script src="https://fontawesome.com" crossorigin="anonymous"></script>
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <h1>Historias de Café</h1>
            <p>Descubre sus historias</p>
        </div>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Explorar Fincas</a>
            <a href="#">Sobre Nosotros</a>
            <a href="#">Contacto</a>
        </nav>
        <div class="search-bar">
            <input type="text" placeholder="Search Bar">
            <button>🔍</button>
        </div>
    </header>

    <main>
        <h2 class="title">CAFÉS DISPONIBLES</h2>
        
        <section id="catalogo-container" class="grid-container">
            <!-- Producto 1 (Repetir este bloque 10 veces para la entrega) -->
            <article class="card">
                <div class="image-placeholder">
                    <img src="https://placeholder.com" alt="Bolsa de Café">
                </div>
                <div class="card-content">
                    <h3>Café Alma - Caturra</h3>
                    <p class="finca">Finca El Suspiro</p>
                    <div class="stars">★★★★☆</div>
                    <p class="description">Notas de cacao y cítricos. Cultivado por familia Pérez.</p>
                    <p class="price">$15.00</p>
                    <div class="card-buttons">
                        <button class="btn-cart">AÑADIR AL CARRITO</button>
                        <button class="btn-detail">👁️ MOSTRAR DETALLE</button>
                    </div>
                </div>
            </article>
            <!-- ... Copiar el bloque <article> 9 veces más ... -->
        </section>
    </main>
</body>
</html>
