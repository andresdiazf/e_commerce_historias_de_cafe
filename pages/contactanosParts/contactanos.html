<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/assets/img/logo.png">
    <title>Contactanos</title>

    <!-- Bootstrap SOLO UNA VEZ -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

      <!-- Iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Estilos -->
    <link rel="stylesheet" href="../../assets/css/paletaColores.css">
    <link rel="stylesheet" href="../../components/navBar/navBar.css">
    <link rel="stylesheet" href="../../components/footer/footer.css">
    <link rel="stylesheet" href="./contactanos.css">
</head>

<body>
    <div id="navbar-container"></div>
    <main class="flex-fill container py-5">
        <div class="card container">
            <div class="text-center mb-4">
                <h2 style="font-family: 'Playfair Display', serif; color: var(--color-primary);">Escríbenos</h2>
                <p style="color: var(--color-primary); opacity: 0.8;">Tu opinión es el aroma de nuestro servicio</p>
            </div>
            <form action="https://formspree.io/f/xlgajpkq" class="row g-3" novalidate target="_top" method="POST">

                <div class="col-12">
                    <label class="form-label" for="name">Nombre</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Tu nombre completo" />
                </div>

                <div class="col-md-6">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="nombre@ejemplo.com" />
                </div>

                <div class="col-md-6">
                    <label class="form-label" for="number">Número Teléfono</label>
                    <input type="tel" class="form-control" id="number" name="number" placeholder="+57 300 1234567" />
                </div>

                <div class="col-12">
                    <label class="form-label" for="message">Mensaje</label>
                    <textarea class="form-control" id="message" name="message" rows="4" required
                        placeholder="Escribe aca tu mensaje de contacto"></textarea>
                </div>

                <div class="col-12 text-end">
                    <button class="btnEnviar btn px-4 py-2" type="submit">Enviar</button>
                </div>
            </form>
    </main>

    <!-- FOOTER -->
    <div id="footer-container"></div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>

</body>

</html>
